<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeMoCap Calibration Chart Generator</title>
    <script>
      (function () {
        var KEY = 'skellychart-theme';
        var p = localStorage.getItem(KEY);
        var resolved = 'dark';
        if (p === 'light') resolved = 'light';
        else if (p === 'dark') resolved = 'dark';
        else
          resolved =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePreference =
          p === 'dark' || p === 'light' ? p : 'system';
      })();
    </script>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="page-header">
        <div class="page-header-bar">
          <div class="page-header-top">
            <img
              id="brandLogo"
              class="brand-mark"
              width="48"
              height="61"
              alt="FreeMoCap"
            />
            <div class="page-header-titles">
              <h1 class="brand" id="pageTitle"></h1>
            </div>
          </div>
          <div
            class="theme-toggle"
            id="themeToggle"
            role="group"
            aria-label="Colour theme"
          >
            <button type="button" class="theme-toggle-btn" data-theme-pick="dark" aria-pressed="false" title="Dark">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
              </svg>
            </button>
            <button type="button" class="theme-toggle-btn" data-theme-pick="light" aria-pressed="false" title="Light">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="5" />
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
              </svg>
            </button>
            <button type="button" class="theme-toggle-btn" data-theme-pick="system" aria-pressed="false" title="System">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect width="18" height="12" x="3" y="4" rx="2" ry="2" />
                <path d="M8 18h8M12 14v4" />
              </svg>
            </button>
          </div>
        </div>
        <p id="intro" class="intro"></p>
      </header>

      <div id="errBanner" class="banner banner-error hidden" role="alert"></div>
      <div id="qrVersionBanner" class="banner banner-warning hidden" role="status"></div>

      <div class="layout">
        <section class="panel panel-controls" aria-labelledby="controls-heading">
          <h2 id="controls-heading" class="visually-hidden">Chart settings</h2>

          <div class="field">
            <label for="distance" id="lbl-distance"></label>
            <select id="distance" class="select"></select>
          </div>

          <div class="field">
            <label for="paper" id="lbl-paper"></label>
            <select id="paper" class="select"></select>
          </div>

          <div class="advanced">
            <h3 id="lbl-advanced" class="advanced-title"></h3>

            <div class="field slider-block">
              <div class="tier-labels" id="tierLabels" aria-hidden="true"></div>
              <div id="tierBar" class="tier-bar" aria-hidden="true"></div>
              <label for="sqmm" id="lbl-square"></label>
              <input type="range" id="sqmm" class="slider" />
            </div>

            <div class="field">
              <label for="pages" id="lbl-pages"></label>
              <input type="range" id="pages" class="slider" />
            </div>

            <div class="field">
              <label for="sx" id="lbl-sx"></label>
              <input type="range" id="sx" class="slider" />
            </div>

            <div class="field">
              <label for="sy" id="lbl-sy"></label>
              <input type="range" id="sy" class="slider" />
            </div>
          </div>

          <p id="layoutSummary" class="layout-summary"></p>

          <div class="actions">
            <button type="button" id="btnPdf" class="btn btn-primary"></button>
            <button type="button" id="btnSaveSvg" class="btn btn-secondary"></button>
            <p id="printScaleHint" class="print-scale-hint"></p>
          </div>
        </section>

        <section class="panel panel-preview" id="panelPreview" aria-labelledby="preview-title">
          <h2 id="preview-title" class="preview-heading"></h2>
          <p id="previewStatus" class="preview-status" role="status" aria-live="polite"></p>
          <p id="previewTruncated" class="caption warning hidden"></p>

          <div id="fullPreviewBlock" class="full-preview-block hidden">
            <p class="caption" id="lbl-fullchart"></p>
            <div class="preview-frame">
              <div id="fullPreviewPlaceholder" class="preview-image-placeholder hidden"></div>
              <img id="boardImg" class="board-img board-img--hidden" alt="" />
              <div id="sheetOverlays" class="sheet-overlays"></div>
            </div>
          </div>

          <div id="thumbGrid" class="thumb-grid"></div>
        </section>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
